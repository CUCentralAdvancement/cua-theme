# ── Global (loads on every page) ────────────────────────────────────────
# overrides.css sits in the theme bucket with a positive weight so it loads
# after style.css (and everything else) — it genuinely gets the last word.
global-styling:
  version: VERSION
  css:
    theme:
      css/style.css: {}
      css/overrides.css:
        weight: 10
    component:
      css/bootstrap.min.css:
        weight: -11
      templates/layout/header/css/header.css:
        weight: -11
      templates/layout/header/css/navigation.css:
        weight: -11
      component/macros/css/card.css:
        weight: -11
      templates/layout/footer/css/footer.css:
        weight: -11
      layouts/css/layout-builder.css:
        weight: -11
  js:
    js/bootstrap.bundle.min.js: {}
    js/global.js: {}
  dependencies:
    - core/popperjs

# ── Layout Builder editing UI (authenticated users only) ────────────────
# Attached in cua_theme_page_attachments_alter(); anonymous visitors never
# download it. Front-end LB rules stay in layouts/css/layout-builder.css.
layout-builder-admin:
  version: VERSION
  css:
    component:
      layouts/css/layout-builder-admin.css:
        weight: -10

# ── FontAwesome (loads on every page) ───────────────────────────────────
fontawesome:
  version: 6.5.1
  css:
    theme:
      dist/fontawesome/css/fontawesome.min.css: {}
      dist/fontawesome/css/brands.min.css: {}
      dist/fontawesome/css/regular.min.css: {}
      dist/fontawesome/css/solid.min.css: {}

# ── Components (loaded per-template via attach_library) ─────────────────

# Accordion
accordion:
  version: VERSION
  css:
    component:
      component/accordion/css/accordion.css:
        weight: -10

# Banner
banner:
  version: VERSION
  css:
    component:
      component/banner/css/banner.css:
        weight: -10
      css/animate.min.css:
        weight: -10

# Call to Action
call-to-action:
  version: VERSION
